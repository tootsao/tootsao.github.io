<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven Corp.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
        crossorigin="anonymous">
    <link rel="icon" type="text/css" href=" ">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0px 0px 15px 0px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-success {
            border-radius: 8px;
            border: none;
            background-color: #0099ff;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            color: #fff;
        }

        .btn-success:hover {
            background-color: #055184;
        }

        .alert {
            border-radius: 8px;
        }

        @media(max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Přihláška do Heaven Corp.</h1>
        <form id="applicationForm">
            <div class="mb-3">
                <label for="name" class="form-label">Jméno Příjmení:</label>
                <input type="text" class="form-control" id="name" placeholder="Jméno Příjmení" name="name"
                    required>
            </div>
            <!-- Other form fields go here -->
            <button type="submit" class="btn btn-success">Odeslat přihlášku</button>
        </form>
    </div>

    <script>
        document.getElementById("applicationForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent the form from submitting normally

            // Construct the data to send to Discord webhook
            var formData = new FormData(this);
            var webhookData = {};
            formData.forEach(function(value, key) {
                webhookData[key] = value;
            });
            var webhookURL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

            // Send data to Discord webhook
            fetch(webhookURL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: "New application submission:",
                    embeds: [{
                        title: "New Application",
                        description: "A new application has been submitted.",
                        fields: Object.entries(webhookData).map(([key, value]) => ({
                            name: key,
                            value: value,
                            inline: true
                        }))
                    }]
                })
            })
            .then(function(response) {
                if (response.ok) {
                    alert("Your application has been submitted successfully.");
                    document.getElementById("applicationForm").reset(); // Clear the form
                } else {
                    throw new Error("Failed to submit application.");
                }
            })
            .catch(function(error) {
                alert("Error: " + error.message);
            });
        });
    </script>
</body>

</html>
