<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heaven Corp.</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        animation: slide-up 0.5s ease-out;
    }
    @keyframes slide-up {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    h2 {
        margin-bottom: 20px;
        color: #333;
        animation: slide-left 0.5s ease-out;
    }
    @keyframes slide-left {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
    .form-group {
        margin-bottom: 20px;
        animation: slide-right 0.5s ease-out;
    }
    @keyframes slide-right {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
    label {
        display: block;
        margin-bottom: 5px;
        color: #666;
    }
    input[type="text"],
    input[type="email"],
    textarea,
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
    }
    textarea {
        height: 100px;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus,
    select:focus {
        border-color: #4CAF50;
    }
    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
        animation: pulse 1.5s infinite;
    }
    input[type="submit"]:hover {
        background-color: #45a049;
    }
    @keyframes pulse {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
        100% {
            transform: scale(1);
        }
    }
    .choices {
        display: flex;
        flex-wrap: wrap;
    }
    .choices label {
        display: inline-block;
        margin-bottom: 5px;
        color: #666;
        margin-right: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Heaven Corp.</h2>

    <form id="jobApplicationForm" action="#" method="post">
        <div class="form-group">
            <label for="fullname">Jm脙漏no P脜聶脙颅jmen脙颅:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="form-group">
            <label for="birthday">Datum narozen脙颅:</label>
            <input type="date" id="birthday" name="birthday" required>
        </div>
        <div class="form-group">
            <label for="email">Emailov脙隆 adresa:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="phone">Telefonn脙颅 脛聧islo:</label>
            <input type="text" id="phone" name="phone">
        </div>
        <div class="form-group">
            <label for="jobType">Odd脛鈥簂en脙颅:</label>
            <select id="jobType" name="jobType" required>
                <option value="logistics">Logistics</option>
                <option value="performance" disabled>Performance ((WIP))</option>
                <option value="towing" disabled>Towing ((WIP))</option>
                <option value="oil" disabled>Oil ((WIP))</option>
                <!-- Add more options as needed -->
            </select>
        </div>
        <div class="form-group">
            <label for="aboutYourself">Tell us about yourself:</label>
            <textarea id="aboutYourself" name="aboutYourself" required></textarea>
        </div>
        <div class="btn-group mb-3" role="group" aria-label="Basic checkbox toggle button group">
  			<input name="rp_a" type="checkbox" class="btn-check" id="rpa" autocomplete="off">
  			<label class="btn btn-outline-success" for="rpa">艠idi膷sk茅 opr谩vn臎n铆 A</label>
			
  			<input name="rp_b" type="checkbox" class="btn-check" id="rpb" autocomplete="off">
  			<label class="btn btn-outline-success" for="rpb">艠idi膷sk茅 opr谩vn臎n铆 B</label>
			
  			<input name="rp_c" type="checkbox" class="btn-check" id="rpc" autocomplete="off">
  			<label class="btn btn-outline-success" for="rpc">艠idi膷sk茅 opr谩vn臎n铆 C</label>
			
  			<input name="lodni_licence" type="checkbox" class="btn-check" id="lodni" autocomplete="off">
  			<label class="btn btn-outline-success" for="lodni">Lodn铆 licence</label>
			
  			<input name="t1" type="checkbox" class="btn-check" id="t1" autocomplete="off">
  			<label class="btn btn-outline-success" for="t1">Zbrojn铆 pr暖kaz T1</label>
			
  			<input name="t2" type="checkbox" class="btn-check" id="t2" autocomplete="off">
  			<label class="btn btn-outline-success" for="t2">Zbrojn铆 pr暖kaz T2</label>
		</div>
        <input type="submit" value="Submit">
    </form>
</div>

<script>
document.getElementById('jobApplicationForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const form = event.target;
    const formData = new FormData(form);
    const payload = {};

    for (const [key, value] of formData.entries()) {
        if (payload[key]) {
            if (!Array.isArray(payload[key])) {
                payload[key] = [payload[key]];
            }
            payload[key].push(value);
        } else {
            payload[key] = value;
        }
    }

    // Format the data for Discord
    let discordMessage = '**New Job Application**\n';
    for (const [key, value] of Object.entries(payload)) {
        discordMessage += `**${key.replace(/([A-Z])/g, ' $1').trim()}:** ${Array.isArray(value) ? value.join(', ') : value}\n`;
    }

    // Send data to Discord webhook
    const webhookUrl = 'https://discord.com/api/webhooks/1209591182737276980/zpPkdw32UtUcy3EiLbijqYc-tdJ2pZ5PuBitnxBRTUOslAJO8ACx3HfBA7Pb6bRvgJaw';
    fetch(webhookUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ content: discordMessage }),
    })
    .then(response => {
        if (response.ok) {
            alert('Form data sent successfully to Discord!');
            resetForm();
        } else {
            alert('Failed to send form data to Discord.');
        }
    })
    .catch(error => {
        console.error('Error sending form data to Discord:', error);
        alert('An error occurred while sending form data to Discord.');
    });
});

function resetForm() {
    document.getElementById('jobApplicationForm').reset();
}
</script>

</body>
</html>
