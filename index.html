<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heaven Corp.</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        animation: slide-up 0.5s ease-out;
    }
    @keyframes slide-up {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    h2 {
        margin-bottom: 20px;
        color: #333;
        animation: slide-left 0.5s ease-out;
    }
    @keyframes slide-left {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
    .form-group {
        margin-bottom: 20px;
        animation: slide-right 0.5s ease-out;
    }
    @keyframes slide-right {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
    label {
        display: block;
        margin-bottom: 5px;
        color: #666;
    }
    input[type="text"],
    input[type="email"],
    textarea,
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
    }
    textarea {
        height: 100px;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus,
    select:focus {
        border-color: #4CAF50;
    }
    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
        animation: pulse 1.5s infinite;
    }
    input[type="submit"]:hover {
        background-color: #45a049;
    }
    @keyframes pulse {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
        100% {
            transform: scale(1);
        }
    }
    .choices {
        display: flex;
        justify-content: space-between;
    }
    .choices label {
        display: inline-block;
        margin-bottom: 5px;
        color: #666;
    }
    .choices input[type="radio"] {
        display: none;
    }
    .choices input[type="radio"] + label {
        padding: 10px 20px;
        background-color: #eee;
        border-radius: 5px;
        cursor: pointer;
    }
    .choices input[type="radio"]:checked + label {
        background-color: #4CAF50;
        color: white;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Heaven Corp.</h2>

    <form id="jobApplicationForm" action="#" method="post">
        <div class="form-group">
            <label for="fullname">JmÃ©no PÅÃ­jmenÃ­:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="form-group">
            <label for="email">EmailovÃ¡ adresa:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="phone">TelefonnÃ­ Äislo:</label>
            <input type="text" id="phone" name="phone">
        </div>
        <div class="form-group">
            <label for="jobType">OddÄlenÃ­:</label>
            <select id="jobType" name="jobType" required>
                <option value="logistics">Logistics</option>
                <option value="performance" disabled>Performance ((WIP))</option>
                <option value="towing" disabled>Towing ((WIP))</option>
                <option value="oil" disabled>Oil ((WIP))</option>
                <!-- Add more options as needed -->
            </select>
        </div>
        <div class="form-group">
            <label for="aboutYourself">Tell us about yourself:</label>
            <textarea id="aboutYourself" name="aboutYourself" required></textarea>
        </div>
        <div class="form-group">
            <label>How did you hear about us?</label>
            <div class="choices">
                <input type="radio" id="radio1" name="how_heard[]" value="social_media">
                <label for="radio1">Social Media</label>
                <input type="radio" id="radio2" name="how_heard[]" value="friend_referral">
                <label for="radio2">Friend Referral</label>
                <input type="radio" id="radio3" name="how_heard[]" value="internet_search">
                <label for="radio3">Internet Search</label>
                <!-- Add more choices as needed -->
            </div>
        </div>
        <input type="submit" value="Submit">
    </form>
</div>

<script>
document.getElementById('jobApplicationForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const form = event.target;
    const formData = new FormData(form);
    const payload = {};

    for (const [key, value] of formData.entries()) {
        payload[key] = value;
    }

    // Format the data for Discord
    let discordMessage = '**New Job Application**\n';
    for (const [key, value] of Object.entries(payload)) {
        discordMessage += `**${key.replace(/([A-Z])/g, ' $1').trim()}:** ${value}\n`;
    }

    // Send data to Discord webhook
    const webhookUrl = 'https://discord.com/api/webhooks/1209591182737276980/zpPkdw32UtUcy3EiLbijqYc-tdJ2pZ5PuBitnxBRTUOslAJO8ACx3HfBA7Pb6bRvgJaw';
    fetch(webhookUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ content: discordMessage }),
    })
    .then(response => {
        if (response.ok) {
            alert('Form data sent successfully to Discord!');
            resetForm();
        } else {
            alert('Failed to send form data to Discord.');
        }
    })
    .catch(error => {
        console.error('Error sending form data to Discord:', error);
        alert('An error occurred while sending form data to Discord.');
    });
});

function resetForm() {
    document.getElementById('jobApplicationForm').reset();
}
</script>

</body>
</html>
