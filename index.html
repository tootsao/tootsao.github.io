<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven Corp.</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
        crossorigin="anonymous">
    <link rel="icon" type="text/css" href=" ">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('images/background.jpg'); /* Specify your background image */
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0px 0px 15px 0px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        h1 img {
            height: 3em; /* Set the height equal to the font size of the title */
            width: auto; /* Maintain aspect ratio */
            margin-right: 10px; /* Adjust spacing between logo and text */
        }
        
        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-success {
            border-radius: 8px;
            border: none;
            background-color: #0099ff;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            color: #fff;
        }

        .btn-success:hover {
            background-color: #055184;
        }

        .alert {
            border-radius: 8px;
        }

        @media(max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="alert alert-warning" style="opacity: 40%;"><center style="font-family: times;">(( Veškeré informace na tomto webu jsou fiktivní a týkají se pouze herního světa! Celý formulář je IC! ))</center></div>
    <div class="container">
        <h1><img src="images/logo.png" alt="Heaven Corp."></h1>
        <form id="applicationForm">
            <div class="mb-3">
                <label for="name" class="form-label">Jméno Příjmení:</label>
                <input type="text" class="form-control" id="name" placeholder="Jméno Příjmení" name="Jméno Příjmení:"
                    required>
            </div>
            <div class="mb-3">
                <label for="dob" class="form-label">Datum narození:</label>
                <input type="date" class="form-control" id="dob" name="Datum narození:" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Emailová Adresa:</label>
                <input type="email" class="form-control" id="email" placeholder="jmeno.prijmeni@post.ic"
                    name="Emailová Adresa:" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Telefonní číslo</label>
                <input type="tel" class="form-control" id="phone" placeholder="000000" name="Telefonní číslo:"
                    required>
            </div>
            <div class="mb-3">
                <label class="form-check-label">Licence:</label><br>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseA" name="Řidičské oprávnění skupiny A">
                    <label class="form-check-label" for="licenseA">Řidičské oprávnění skupiny A</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseB" name="Řidičské oprávnění skupiny B">
                    <label class="form-check-label" for="licenseB">Řidičské oprávnění skupiny B</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseC" name="Řidičské oprávnění skupiny C">
                    <label class="form-check-label" for="licenseC">Řidičské oprávnění skupiny C</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseBoat" name="Lodní licence">
                    <label class="form-check-label" for="licenseBoat">Lodní licence</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseT1" name="Zbrojní průkaz T1">
                    <label class="form-check-label" for="licenseT1">Zbrojní průkaz T1</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="licenseT2" name="Zbrojní průkaz T2">
                    <label class="form-check-label" for="licenseT2">Zbrojní průkaz T2</label>
                </div>
            </div>
            <div class="mb-3">
                <label for="position" class="form-label">Oddělení:</label>
                <select class="form-select" id="position" name="Oddělení:" required>
                    <option selected disabled>- Vyber si oddělení -</option>
                    <option>Logistics</option>
                    <option disabled>Performance [Plánuje se]</option>
                    <option disabled>Towing [Plánuje se]</option>
                    <option disabled>Oil [Plánuje se]</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success">Odeslat přihlášku</button>
        </form>
        <div id="confirmationMessage" class="confirmation-message" style="display: none;">
            🎉Děkujeme za odeslání přihlášky k nám do firmy, v brzké době vás budeme kontaktovat skrze vaši emailovou adresu.
        </div>
    </div>

    <script>
document.getElementById("applicationForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent the form from submitting normally

    // Construct the data to send to Discord webhook
    var formData = new FormData(this);
    var webhookData = {};
    formData.forEach(function(value, key) {
        if (key.startsWith("license")) {
            // Using emojis directly
            webhookData[key] = value ? "✅" : "❌";
        } else {
            webhookData[key] = value;
        }
    });
    var webhookURL = "https://discord.com/api/webhooks/1209591182737276980/zpPkdw32UtUcy3EiLbijqYc-tdJ2pZ5PuBitnxBRTUOslAJO8ACx3HfBA7Pb6bRvgJaw";

    // Send data to Discord webhook
    fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content: "",
            embeds: [{
                color: 39423,
                fields: Object.entries(webhookData).map(([key, value]) => ({
                    name: key,
                    value: value,
                    inline: true
                }))
            }]
        })
    })
    .then(function(response) {
        if (response.ok) {
            document.getElementById("applicationForm").reset(); // Clear the form
            document.getElementById("applicationForm").style.display = "none"; // Hide the form
            document.getElementById("confirmationMessage").style.display = "block"; // Show confirmation message
        } else {
            throw new Error("Failed to submit application.");
        }
    })
    .catch(function(error) {
        alert("Error: " + error.message);
    });
});
    </script>
</body>

</html>
